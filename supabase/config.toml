
[functions.nofly-tiles]
enabled = true
verify_jwt = true
import_map = "./functions/nofly-tiles/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/nofly-tiles/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/nofly-tiles/*.html" ]

# Database migrations configuration
[db.migrations]
# Apply schemas from the schemas directory before migrations
schema_paths = [
  "./schemas/*.sql"
]
